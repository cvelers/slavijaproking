<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="multiply"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ddd0be"/>
      <stop offset="40%" stop-color="#c8b89c"/>
      <stop offset="100%" stop-color="#9a8468"/>
    </linearGradient>
    <linearGradient id="riverbed" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a5a48" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#4a3e30" stop-opacity="0.55"/>
    </linearGradient>
    <radialGradient id="shimmer" cx="0.4" cy="0.65" r="0.35">
      <stop offset="0%" stop-color="#ef7a21" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#ef7a21" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#sky)"/>
  <!-- Landscape hills -->
  <path d="M0,160 Q80,130 160,150 Q260,110 360,140 Q460,105 540,130 Q580,120 600,135 L600,190 L0,190 Z" fill="#7a6a55" opacity="0.18"/>
  <path d="M0,180 Q120,165 200,175 Q320,155 420,172 Q520,160 600,170 L600,200 L0,200 Z" fill="#6a5a48" opacity="0.12"/>
  <!-- River banks -->
  <g filter="url(#softglow)">
    <path d="M0,180 Q50,175 100,185 L100,340 L0,340 Z" fill="#4a3e30" opacity="0.5"/>
    <path d="M500,175 Q550,170 600,180 L600,340 L500,340 Z" fill="#4a3e30" opacity="0.5"/>
  </g>
  <!-- Retaining wall / embankment (engineering element) -->
  <g opacity="0.6">
    <rect x="88" y="185" width="14" height="155" fill="#5a4e40"/>
    <rect x="498" y="180" width="14" height="160" fill="#5a4e40"/>
    <!-- Wall texture lines -->
    <g stroke="#6a5e50" stroke-width="0.8" opacity="0.5">
      <line x1="88" y1="210" x2="102" y2="210"/>
      <line x1="88" y1="240" x2="102" y2="240"/>
      <line x1="88" y1="270" x2="102" y2="270"/>
      <line x1="88" y1="300" x2="102" y2="300"/>
      <line x1="498" y1="205" x2="512" y2="205"/>
      <line x1="498" y1="235" x2="512" y2="235"/>
      <line x1="498" y1="265" x2="512" y2="265"/>
      <line x1="498" y1="295" x2="512" y2="295"/>
    </g>
  </g>
  <!-- River water -->
  <rect x="102" y="185" width="396" height="155" fill="url(#riverbed)"/>
  <!-- Water flow patterns -->
  <g stroke="#c4a878" stroke-width="1.5" opacity="0.15" fill="none">
    <path d="M110,210 Q170,202 230,212 Q290,220 350,210 Q410,202 470,214 Q490,218 500,212"/>
    <path d="M110,235 Q180,228 250,238 Q320,246 390,235 Q440,228 500,240"/>
    <path d="M110,260 Q165,252 220,262 Q280,270 340,258 Q400,250 460,264 Q490,268 500,262"/>
    <path d="M110,285 Q175,278 240,288 Q310,296 380,285 Q430,278 500,290"/>
    <path d="M110,310 Q170,302 230,312 Q300,320 370,308 Q430,300 500,314"/>
  </g>
  <!-- Sun shimmer on water -->
  <rect width="600" height="340" fill="url(#shimmer)"/>
  <!-- Warm accent glow -->
  <g opacity="0.15">
    <ellipse cx="300" cy="250" rx="120" ry="40" fill="#ef7a21"/>
  </g>
  <!-- Vegetation hints on banks -->
  <g opacity="0.15">
    <ellipse cx="50" cy="175" rx="35" ry="15" fill="#5a6a40"/>
    <ellipse cx="560" cy="170" rx="30" ry="12" fill="#5a6a40"/>
  </g>
  <!-- Grain -->
  <rect width="600" height="340" filter="url(#grain)" opacity="0.1"/>
</svg>