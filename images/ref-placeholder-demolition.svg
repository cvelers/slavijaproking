<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="multiply"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d8c8b4"/>
      <stop offset="100%" stop-color="#b09878"/>
    </linearGradient>
    <radialGradient id="dust" cx="0.45" cy="0.55" r="0.45">
      <stop offset="0%" stop-color="#c4a878" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#c4a878" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="heat" cx="0.4" cy="0.7" r="0.3">
      <stop offset="0%" stop-color="#ef7a21" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ef7a21" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#sky)"/>
  <!-- Dust cloud -->
  <rect width="600" height="340" fill="url(#dust)"/>
  <!-- Partially demolished building -->
  <g filter="url(#softglow)">
    <!-- Standing portion -->
    <rect x="160" y="90" width="120" height="190" fill="#4a3e30" rx="2"/>
    <!-- Broken top edge -->
    <polygon points="280,90 280,120 310,140 310,110 340,130 340,160 370,170 370,280 280,280" fill="#3e3428"/>
    <!-- Jagged break line -->
    <polygon points="280,90 290,105 285,118 310,140 305,128 320,135 340,130 330,145 350,160 370,170 370,90" fill="url(#sky)" opacity="0.6"/>
  </g>
  <!-- Exposed rebar/structure lines -->
  <g stroke="#ef7a21" stroke-width="1.5" opacity="0.3">
    <line x1="285" y1="108" x2="295" y2="85"/>
    <line x1="310" y1="135" x2="318" y2="110"/>
    <line x1="335" y1="148" x2="340" y2="125"/>
    <line x1="355" y1="165" x2="360" y2="142"/>
  </g>
  <!-- Windows on standing part -->
  <rect x="180" y="120" width="20" height="26" rx="2" fill="#ef7a21" opacity="0.2"/>
  <rect x="215" y="120" width="20" height="26" rx="2" fill="#daa060" opacity="0.25"/>
  <rect x="250" y="120" width="20" height="26" rx="2" fill="#ef7a21" opacity="0.15"/>
  <rect x="180" y="165" width="20" height="26" rx="2" fill="#daa060" opacity="0.2"/>
  <rect x="215" y="165" width="20" height="26" rx="2" fill="#ef7a21" opacity="0.25"/>
  <rect x="250" y="165" width="20" height="26" rx="2" fill="#daa060" opacity="0.15"/>
  <rect x="180" y="210" width="20" height="26" rx="2" fill="#ef7a21" opacity="0.2"/>
  <rect x="215" y="210" width="20" height="26" rx="2" fill="#2a2218" opacity="0.4"/>
  <!-- Fallen debris blocks -->
  <g opacity="0.5">
    <rect x="390" y="240" width="30" height="22" fill="#5a4e40" rx="1" transform="rotate(12 405 251)"/>
    <rect x="350" y="255" width="25" height="18" fill="#4a3e30" rx="1" transform="rotate(-8 362 264)"/>
    <rect x="420" y="258" width="22" height="16" fill="#5a4e40" rx="1" transform="rotate(5 431 266)"/>
    <rect x="370" y="230" width="18" height="14" fill="#4a3e30" rx="1" transform="rotate(-15 379 237)"/>
    <rect x="440" y="245" width="15" height="12" fill="#5a4e40" rx="1" transform="rotate(20 447 251)"/>
    <rect x="410" y="222" width="12" height="10" fill="#4a3e30" rx="1" transform="rotate(-10 416 227)"/>
  </g>
  <!-- Crane silhouette (background) -->
  <g opacity="0.15">
    <rect x="480" y="40" width="6" height="240" fill="#3a3028"/>
    <rect x="430" y="42" width="120" height="5" fill="#3a3028"/>
    <line x1="486" y1="42" x2="430" y2="70" stroke="#3a3028" stroke-width="2"/>
    <line x1="486" y1="42" x2="550" y2="60" stroke="#3a3028" stroke-width="2"/>
    <line x1="435" y1="47" x2="435" y2="90" stroke="#3a3028" stroke-width="1.5"/>
  </g>
  <!-- Ground / rubble -->
  <rect x="0" y="280" width="600" height="60" fill="#3e3428" opacity="0.5"/>
  <rect x="0" y="278" width="600" height="2" fill="#ef7a21" opacity="0.2"/>
  <!-- Heat/energy glow -->
  <rect width="600" height="340" fill="url(#heat)"/>
  <!-- Grain -->
  <rect width="600" height="340" filter="url(#grain)" opacity="0.12"/>
</svg>