    <rect x="286" y="216" width="22" height="14" rx="1" fill="#daa060" opacity="0.2"/>
    <rect x="230" y="239" width="22" height="14" rx="1" fill="#c4a878" opacity="0.2"/>
    <rect x="258" y="239" width="22" height="14" rx="1" fill="#daa060" opacity="0.2"/>
    <rect x="286" y="239" width="22" height="14" rx="1" fill="#ef7a21" opacity="0.25"/>
  </g>
  <!-- Secondary building (left) -->
