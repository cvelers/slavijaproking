<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="multiply"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e2d4c2"/>
      <stop offset="100%" stop-color="#bca888"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#6a5e50"/>
      <stop offset="100%" stop-color="#3e3630"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.55" cy="0.35" r="0.4">
      <stop offset="0%" stop-color="#ef7a21" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef7a21" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#sky)"/>
  <rect width="600" height="340" fill="url(#glow)"/>
  <!-- Modern tower (main) -->
  <g filter="url(#softglow)">
    <rect x="220" y="40" width="110" height="240" fill="url(#glass)" rx="3"/>
  </g>
  <!-- Glass curtain wall reflections -->
  <g opacity="0.6">
    <rect x="230" y="55" width="22" height="14" rx="1" fill="#c4a878" opacity="0.25"/>
    <rect x="258" y="55" width="22" height="14" rx="1" fill="#ef7a21" opacity="0.15"/>
    <rect x="286" y="55" width="22" height="14" rx="1" fill="#c4a878" opacity="0.2"/>
