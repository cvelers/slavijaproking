<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="multiply"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="15" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#dcc8b0"/>
      <stop offset="60%" stop-color="#c4a888"/>
      <stop offset="100%" stop-color="#a88868"/>
    </linearGradient>
    <linearGradient id="road" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5a5048"/>
      <stop offset="100%" stop-color="#3e3630"/>
    </linearGradient>
    <radialGradient id="lamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0%" stop-color="#ef7a21" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#ef7a21" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#sky)"/>
  <!-- City silhouette background -->
  <g opacity="0.18" filter="url(#softglow)">
    <rect x="30" y="100" width="45" height="140" fill="#5a4a3a"/>
    <rect x="80" y="80" width="55" height="160" fill="#5a4a3a"/>
    <rect x="140" y="110" width="40" height="130" fill="#5a4a3a"/>
    <rect x="420" y="90" width="50" height="150" fill="#5a4a3a"/>
    <rect x="480" y="105" width="45" height="135" fill="#5a4a3a"/>
    <rect x="530" y="75" width="70" height="165" fill="#5a4a3a"/>
  </g>
  <!-- Road surface - perspective -->
  <polygon points="230,130 370,130 560,340 40,340" fill="url(#road)" opacity="0.7"/>
  <!-- Road markings -->
  <g opacity="0.4">
    <rect x="290" y="145" width="6" height="22" rx="1" fill="#daa060" transform="rotate(0)"/>
    <rect x="286" y="180" width="8" height="26" rx="1" fill="#daa060"/>
    <rect x="280" y="220" width="10" height="30" rx="1" fill="#daa060"/>
    <rect x="272" y="268" width="14" height="36" rx="1" fill="#daa060"/>
  </g>
  <!-- Street lamp glow -->
  <circle cx="190" cy="200" r="50" fill="url(#lamp)"/>
  <circle cx="410" cy="180" r="45" fill="url(#lamp)"/>
  <!-- Lamp posts -->
  <rect x="188" y="140" width="4" height="100" fill="#4a3e32" rx="1"/>
  <circle cx="190" cy="138" r="6" fill="#ef7a21" opacity="0.45"/>
  <rect x="408" y="130" width="4" height="90" fill="#4a3e32" rx="1"/>
  <circle cx="410" cy="128" r="6" fill="#ef7a21" opacity="0.4"/>
  <!-- Sidewalk edges -->
  <line x1="230" y1="130" x2="40" y2="340" stroke="#ef7a21" stroke-width="1.5" opacity="0.15"/>
  <line x1="370" y1="130" x2="560" y2="340" stroke="#ef7a21" stroke-width="1.5" opacity="0.15"/>
  <!-- Grain -->
  <rect width="600" height="340" filter="url(#grain)" opacity="0.1"/>
</svg>