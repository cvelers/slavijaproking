<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 718 520" width="718" height="520">
  <defs>
    <style>
      .mark {
        transform-box: view-box;
        transform-origin: center;
        animation: markDrift 8.5s ease-in-out infinite;
      }
      .left-mass,
      .right-mass,
      .core {
        transform-box: fill-box;
        transform-origin: center;
      }
      .left-mass {
        animation: leftShift 5.2s cubic-bezier(0.4,0,0.2,1) infinite;
      }
      .right-mass {
        animation: rightShift 5.2s cubic-bezier(0.4,0,0.2,1) infinite;
      }
      .core {
        animation: coreLift 5.2s cubic-bezier(0.4,0,0.2,1) infinite;
      }
      @keyframes markDrift {
        0%, 100% { transform: translate(0px, 0px); }
        25%      { transform: translate(0.8px, -0.6px); }
        50%      { transform: translate(1.4px, -1px); }
        75%      { transform: translate(0.6px, -0.4px); }
      }
      @keyframes leftShift {
        0%, 100% { transform: translateX(0px); }
        50%      { transform: translateX(-3px); }
      }
      @keyframes rightShift {
        0%, 100% { transform: translateX(0px); }
        50%      { transform: translateX(3px); }
      }
      @keyframes coreLift {
        0%, 100% { transform: translateY(0px); }
        50%      { transform: translateY(-2px); }
      }
    </style>
    <mask id="logo-cutouts-w" maskUnits="userSpaceOnUse">
      <rect x="0" y="0" width="718" height="520" fill="#ffffff"/>
      <path fill="#000000"
            d="M199 217
               V209
               A14 14 0 0 1 193 198
               L262 154
