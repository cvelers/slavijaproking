               L415 204
               H610
               V217
               Z"/>
      <path fill="#000000"
            d="M357 316
               H587
               C590 316 592 319 592 322
               C592 325 590 328 587 328
               H359
               Z"/>
    </mask>
  </defs>
  <g class="mark" mask="url(#logo-cutouts-w)">
    <g class="left-mass" fill="#ffffff">
      <path d="M245 56
               V165
               L188 199
               C184 202 184 215 189 217
               H245
               V316
               H141
               C118 316 97 309 79 292
               C64 278 56 257 56 236
               V201
               C56 180 64 161 79 146
               C86 139 95 133 105 128
               Z"/>
      <rect x="56" y="328" width="189" height="102"/>
    </g>
    <g class="right-mass" fill="#ffffff">
      <path d="M359 56
               V168
               L416 202
               H610
               Z"/>
      <path d="M359 217
               H593
               C648 217 691 265 691 323
               C691 382 648 430 593 430
