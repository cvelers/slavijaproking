<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="multiply"/>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d4c0a8"/>
      <stop offset="100%" stop-color="#b89878"/>
    </linearGradient>
    <radialGradient id="haze" cx="0.3" cy="0.6" r="0.6">
      <stop offset="0%" stop-color="#ef7a21" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#ef7a21" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="600" height="340" fill="url(#sky)"/>
  <!-- Factory silhouette -->
  <g filter="url(#softglow)">
    <!-- Main hall -->
    <rect x="120" y="140" width="320" height="140" fill="#3e3228" rx="2"/>
    <!-- Sawtooth roof -->
    <polygon points="120,140 120,100 200,140" fill="#4a3e32"/>
    <polygon points="200,140 200,95 290,140" fill="#4a3e32"/>
    <polygon points="290,140 290,100 380,140" fill="#4a3e32"/>
    <polygon points="380,140 380,105 440,140" fill="#4a3e32"/>
    <!-- Tall smokestack -->
    <rect x="460" y="50" width="28" height="230" fill="#3a3028" rx="2"/>
    <ellipse cx="474" cy="50" rx="14" ry="5" fill="#4a3e32"/>
    <!-- Second shorter stack -->
    <rect x="500" y="100" width="20" height="180" fill="#4a3e32" rx="2"/>
  </g>
  <!-- Industrial windows (warm glow) -->
  <rect x="145" y="175" width="50" height="30" rx="2" fill="#ef7a21" opacity="0.35"/>
  <rect x="210" y="175" width="50" height="30" rx="2" fill="#daa060" opacity="0.3"/>
  <rect x="275" y="175" width="50" height="30" rx="2" fill="#ef7a21" opacity="0.25"/>
  <rect x="340" y="175" width="50" height="30" rx="2" fill="#daa060" opacity="0.35"/>
  <!-- Large loading door -->
  <rect x="230" y="230" width="60" height="50" rx="2" fill="#2a2218"/>
  <rect x="310" y="230" width="60" height="50" rx="2" fill="#2a2218"/>
  <!-- Smoke wisps -->
  <g opacity="0.15" fill="none" stroke="#8a7a68" stroke-width="3">
    <path d="M474,45 C480,25 468,15 476,-5"/>
    <path d="M470,42 C462,20 474,8 466,-10"/>
    <path d="M510,96 C516,80 506,72 512,58"/>
  </g>
  <!-- Ground -->
  <rect x="0" y="280" width="600" height="60" fill="#2e2620" opacity="0.6"/>
  <rect x="0" y="278" width="600" height="2" fill="#ef7a21" opacity="0.2"/>
  <!-- Haze -->
  <rect width="600" height="340" fill="url(#haze)"/>
  <!-- Grain -->
  <rect width="600" height="340" filter="url(#grain)" opacity="0.1"/>
</svg>