<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340">
  <defs>
    <filter id="grain" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" result="noise"/>
      <feColorMatrix type="saturate" values="0" in="noise" result="mono"/>
      <feBlend in="SourceGraphic" in2="mono" mode="multiply" result="blend"/>
      <feComponentTransfer in="blend">
        <feFuncA type="linear" slope="1"/>
      </feComponentTransfer>
    </filter>
    <filter id="softglow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8d5c0"/>
      <stop offset="100%" stop-color="#c9a882"/>
    </linearGradient>
    <linearGradient id="warm" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ef7a21" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#d4650a" stop-opacity="0.08"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.7" cy="0.25" r="0.5">
      <stop offset="0%" stop-color="#f5a855" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#f5a855" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Base -->
  <rect width="600" height="340" fill="url(#sky)"/>
  <rect width="600" height="340" fill="url(#sun)"/>
  <!-- Simple bold house silhouette -->
  <g filter="url(#softglow)">
    <rect x="160" y="120" width="200" height="160" fill="#4a3d30" rx="3"/>
    <polygon points="140,120 260,40 380,120" fill="#5a4a3a"/>
  </g>
  <!-- Warm window glow -->
  <rect x="195" y="155" width="30" height="35" rx="2" fill="#ef7a21" opacity="0.5"/>
  <rect x="245" y="155" width="30" height="35" rx="2" fill="#daa060" opacity="0.4"/>
  <rect x="295" y="155" width="30" height="35" rx="2" fill="#ef7a21" opacity="0.35"/>
  <rect x="195" y="210" width="30" height="35" rx="2" fill="#daa060" opacity="0.45"/>
  <rect x="295" y="210" width="30" height="35" rx="2" fill="#ef7a21" opacity="0.4"/>
  <!-- Door -->
  <rect x="245" y="225" width="30" height="55" rx="2" fill="#2a2218"/>
  <!-- Ground -->
  <rect x="0" y="280" width="600" height="60" fill="#3a3028" opacity="0.5"/>
  <!-- Accent line -->
  <rect x="0" y="278" width="600" height="2" fill="#ef7a21" opacity="0.3"/>
  <!-- Warm overlay -->
  <rect width="600" height="340" fill="url(#warm)"/>
  <!-- Grain texture -->
  <rect width="600" height="340" filter="url(#grain)" opacity="0.12"/>
</svg>